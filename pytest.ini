[pytest]
minversion = 7.0
testpaths = tests
pythonpath = .
addopts =
    -ra
    --strict-markers
    --strict-config
    --tb=short
filterwarnings =
    ignore::DeprecationWarning:google.*
    ignore::DeprecationWarning:pkg_resources.*
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests requiring external services
